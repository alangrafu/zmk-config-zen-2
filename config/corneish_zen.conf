# go to sleep after one hour (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_POINTING=y

# Enable smooth scrolling via HID Resolution Multipliers.
# Makes scroll feel more natural / fine-grained on modern OSes (macOS, Windows 11).
# When enabled, acceleration-exponent on &msc is ignored (forced to 0 for smoothness).
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y 
